<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Birthday Invitation</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #aeefff, #d4f6ff, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #4da6ff;
            margin-bottom: 10px;
        }

        h2 {
            color: #66b3ff;
            margin-top: 0;
        }

        img {
            width: 100%;
            border-radius: 15px;
            margin: 15px 0;
        }

        h3 {
            color: #3399ff;
            margin-bottom: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: #e6f7ff;
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #66ccff, #3399ff);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🎉 It's My Birthday! 🎂</h1>
        <h2>31st March</h2>

        <img src="gambar.jpeg" alt="Birthday Cake">

        <h3>🎁 What to Bring:</h3>
        <ul>
            <li>🎈 Balloons (I love balloons!)</li>
            <li>🎂 Cake (I'm really good at eating 😋)</li>
            <li>🍔 Appetite (Lots of food waiting!)</li>
        </ul>

        <h3>📍 Location:</h3>
        <a href="https://www.google.com/maps/@35.7040744,139.5577317,3a,75y,289.6h,87.01t,0.72r/
    data=!3m6!1e1!3m4!1sgT28ssf0BB2LxZ63JNcL1w!2e0!7i13312!8i6656">
            View on Google Maps
        </a>
    </div>

</body>

</html>
